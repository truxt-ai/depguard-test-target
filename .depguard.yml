version: 1

# ── FEATURE: update_strategy ──────────────────────────────────────────────────
# aggressive = patch + minor + major all allowed.
# This lets us see BREAKING draft PRs, CONDITIONAL co-upgrades, and security PRs
# for packages that only have a major-version fix available.
# Switch to "standard" to block major bumps and only see patch/minor PRs.
update_strategy: aggressive

ecosystems:
  - node
  - python
  - go

# ── FEATURE: cooldown_days ────────────────────────────────────────────────────
# 0 = propose versions immediately after release.
# Set to 7 to wait a week before proposing a freshly released version.
cooldown_days: 0

# ── FEATURE: ignore ───────────────────────────────────────────────────────────
ignore:
  # Test A — complete ignore, no expiry, no version range
  # moment will NEVER appear in any PR regardless of CVEs or updates.
  - name: moment
    reason: "Legacy date library, migration planned for Q3 2026"

  # Test B — ignore with ACTIVE expiry (future date = rule still active)
  # nodemon will be skipped until 2026-12-31. After that it reappears.
  - name: nodemon
    reason: "Dev tool, team prefers manual control"
    until: 2026-12-31

  # Test C — ignore with EXPIRED expiry (past date = rule no longer active)
  # This rule HAS expired → axios WILL get a PR despite being in the ignore list.
  - name: axios
    reason: "Was frozen during v1 migration — freeze now lifted"
    until: 2026-01-01

  # Test D — ignore with version range (blocks only specific target versions)
  # urllib3 upgrades to >=3.0.0 are blocked. urllib3 2.x is still proposed.
  - name: urllib3
    versions: ">=3.0.0"
    reason: "urllib3 3.x not yet evaluated for breaking SSL API changes"

# ── FEATURE: snooze ───────────────────────────────────────────────────────────
snooze:
  # Test E — active snooze (future date = currently snoozed, skipped)
  babel-jest: 2026-06-01

  # Test F — expired snooze (past date = snooze lifted, WILL be proposed)
  "@babel/core": "2026-01-01"

# ── FEATURE: groups ───────────────────────────────────────────────────────────
groups:
  # Test G — related packages bundled into ONE PR instead of separate PRs
  # express + body-parser + compression → single "express-stack" PR
  - name: express-stack
    patterns:
      - "express"
      - "body-parser"
      - "compression"
    update_types:
      - patch
      - minor
      - major

  # Test H — flask co-dependency chain → single "flask-stack" PR
  # Also demonstrates CONDITIONAL: upgrading flask requires jinja2 + werkzeug
  - name: flask-stack
    patterns:
      - "flask"
      - "jinja2"
      - "werkzeug"
    update_types:
      - patch
      - minor
      - major

# ── FEATURE: PR configuration ─────────────────────────────────────────────────
pr:
  # Commits read: "chore(deps): bump lodash 4.16.0 → 4.17.23"
  commit_message_prefix: "chore(deps)"

  labels:
    - "depguard"
    - "dependencies"

  # Test I — BREAKING resolution status → opens as GitHub Draft PR
  draft_breaking: true

  # Test J — max_open_prs cap: stops after 8 PRs, queues the rest
  max_open_prs: 8

  # Test K — CVE links in security PR body (NVD / OSV links)
  link_to_alert: true

# ── FEATURE: auto_dismiss_dev_low_severity ────────────────────────────────────
# Test L — LOW severity CVEs on devDependencies are silently dropped.
# debug@2.6.0 has HIGH → NOT dismissed (HIGH bypasses this rule).
# mocha@3.0.0 has LOW → dismissed silently.
auto_dismiss_dev_low_severity: true

# ── FEATURE: severity_threshold ───────────────────────────────────────────────
# LOW = report all CVEs including LOW severity ones.
severity_threshold: LOW

# ── FEATURE: auto_pause ───────────────────────────────────────────────────────
# Test M — if 5+ DepGuard PRs are already open and unmerged, pause and alert.
# Merge/close a few PRs to re-enable scanning.
auto_pause_ignored_prs: true
auto_pause_threshold: 5

max_retries: 3
